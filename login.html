{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div style="margin-left: -250px;">
    <div class="row justify-content-center" style="padding-top: 60px;">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-building" style="font-size: 3rem; color: #1a3a5c;"></i>
                    <h3 class="mt-2">Вход в систему</h3>
                    <p class="text-muted">ServiceDesk Ланит-Партнер</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Логин</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('register') }}" class="text-decoration-none">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
