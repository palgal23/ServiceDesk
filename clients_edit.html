{% extends 'base.html' %}

{% block title %}Редактировать клиента{% endblock %}

{% block content %}
<h2 class="mb-4" style="font-weight: 600; color: #1a3a5c;">
    <i class="bi bi-pencil"></i> Редактировать клиента: {{ client.name }}
</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Название организации *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ client.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="contact_person" class="form-label">Контактное лицо *</label>
                            <input type="text" class="form-control" id="contact_person" name="contact_person" value="{{ client.contact_person }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Телефон *</label>
                            <input type="text" class="form-control" id="phone" name="phone" value="{{ client.phone }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ client.email }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Адрес</label>
                        <input type="text" class="form-control" id="address" name="address" value="{{ client.address if client.address else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="contract_number" class="form-label">Номер договора</label>
                        <input type="text" class="form-control" id="contract_number" name="contract_number" value="{{ client.contract_number if client.contract_number else '' }}">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if client.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Активен</label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Сохранить
                    </button>
                    <a href="{{ url_for('clients_list') }}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
